services:
  istsos4-gui:
    container_name: istsos4-gui
    build:
      context: ui
      dockerfile: Dockerfile.dev
    restart: always
    ports:
      - 2000:3000
    volumes:
      - ./ui/:/home/node/app
      - /home/node/app/node_modules
    environment:
      NEXT_PUBLIC_BASE_PATH: ${NEXT_APP_URL}
    command: npm run dev
    networks:
     - istsos4_default
     
networks:
  istsos4_default:
    external: true