services:
  istsos4-gui:
    container_name: istsos4-gui
    build:
      context: ui
      dockerfile: Dockerfile.dev
    restart: always
    ports:
      - 2000:3000
    volumes:
      - ./ui/:/home/node/app
    environment:
      NEXT_PUBLIC_BASE_PATH: ${NEXT_APP_URL}
      NEXT_PUBLIC_ISTSOS4_URL: ${NEXT_PUBLIC_ISTSOS4_URL}
    command: npm run dev
    networks:
     - istsos4-network
     
networks:
  istsos4-network:
    external: true
